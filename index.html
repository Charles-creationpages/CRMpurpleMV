<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Purple · Suivi Mâcon / Villefranche</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap");
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0EBE2;--surface:#FFFFFF;--surface2:#F6F2E9;
  --border:#E4DACA;--border2:#D3C4A9;
  --brown-dark:#4A3A2B;--brown:#5C4529;
  --accent:#8B6B43;--accent-d:#6E5330;--accent-l:#EDE4D3;--accent-l2:#E2D2B6;
  --text:#3D3020;--text2:#7A6B57;--text3:#A89A85;
  --gold:#CBB68C;--green:#5E7A4E;--green-bg:#E7EEDF;
  --orange-bg:#F7EBD6;--orange-fg:#8A5A1B;
  --sh:0 2px 12px rgba(74,58,43,.06);--sh-md:0 8px 26px rgba(74,58,43,.14);--sh-lg:0 12px 40px rgba(74,58,43,.20);
}
body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;font-size:14px;line-height:1.5;}
.brand-font{font-family:"Barlow",sans-serif;}

.app{display:flex;height:100vh;overflow:hidden;}
.sb{width:212px;min-width:212px;background:var(--brown-dark);display:flex;flex-direction:column;flex-shrink:0;}
.sb-brand{padding:20px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo{width:38px;height:38px;background:var(--gold);border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--brown-dark);font-weight:800;font-size:19px;font-family:"Barlow",sans-serif;flex-shrink:0;}
.sb-name{font-family:"Barlow",sans-serif;font-weight:800;font-size:18px;color:#fff;line-height:1;}
.sb-sub{font-size:9px;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.09em;margin-top:3px;}
.sb-nav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:3px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;color:rgba(255,255,255,.62);font-weight:700;font-size:13.5px;cursor:pointer;font-family:"Barlow",sans-serif;transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:var(--gold);color:var(--brown-dark);}
.nav-item .nl{flex:1;}
.nav-count{background:rgba(255,255,255,.14);color:#fff;border-radius:20px;padding:0 7px;font-size:11px;font-weight:700;}
.nav-item.active .nav-count{background:rgba(74,58,43,.2);color:var(--brown-dark);}
.nav-soon{font-size:8.5px;font-weight:800;color:var(--gold);letter-spacing:.04em;}
.nav-item.active .nav-soon{color:var(--brown-dark);}
.sb-footer{padding:14px;border-top:1px solid rgba(255,255,255,.08);}
.logout-btn{display:flex;align-items:center;gap:8px;width:100%;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.72);padding:9px 12px;border-radius:9px;cursor:pointer;font-family:"Inter",sans-serif;font-size:12.5px;font-weight:600;transition:all .15s;}
.logout-btn:hover{background:rgba(255,255,255,.16);color:#fff;}

.content{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.demo-banner{background:var(--accent-l);color:var(--accent-d);font-size:12px;font-weight:600;text-align:center;padding:6px 14px;flex-shrink:0;border-bottom:1px solid var(--accent-l2);}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;flex-shrink:0;}
.pt{font-family:"Barlow",sans-serif;font-weight:800;font-size:20px;color:var(--text);line-height:1;}
.ps{font-size:12px;color:var(--text3);margin-top:3px;}
.tb-right{display:flex;align-items:center;gap:10px;}
.search-bar{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;width:220px;color:var(--text3);}
.search-bar input{border:none;background:transparent;outline:none;font-family:"Inter",sans-serif;font-size:13px;color:var(--text);width:100%;}
.search-bar input::placeholder{color:var(--text3);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:9px;font-family:"Inter",sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(139,107,67,.28);}
.btn-p:hover{background:var(--accent-d);}
.btn-g{background:transparent;border:1.5px solid var(--border2);color:var(--text2);}
.btn-g:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}
.mobile-logout{display:none;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text2);width:38px;height:38px;border-radius:9px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;}

.body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
.board-scroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:18px 22px;}
.kb-wrap{display:flex;gap:13px;align-items:flex-start;height:100%;min-width:min-content;}
.kb-col{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:12px 11px;width:238px;min-width:238px;flex-shrink:0;max-height:100%;display:flex;flex-direction:column;transition:all .15s;}
.kb-col.drag-over{background:var(--accent-l);border-color:var(--accent-l2);box-shadow:inset 0 0 0 2px var(--accent-l2);}
.kb-col-hd{display:flex;align-items:center;gap:9px;padding:3px 4px 11px;margin-bottom:9px;border-bottom:1.5px solid var(--border);flex-shrink:0;}
.kb-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.kb-col-title{font-size:15px;font-weight:700;color:var(--text);flex:1;font-family:"Barlow",sans-serif;}
.kb-count{background:var(--surface);border:1px solid var(--border2);color:var(--text2);border-radius:50%;min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;padding:0 6px;}
.kb-list{overflow-y:auto;overflow-x:visible;flex:1;padding:2px 2px 4px;margin:0 -2px;}
.kb-empty{text-align:center;padding:22px 0;color:var(--text3);font-size:11px;font-style:italic;}

.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px 11px;margin-bottom:9px;cursor:pointer;transition:box-shadow .15s,transform .15s;box-shadow:var(--sh);}
.card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.card.win{background:var(--green-bg);border-color:#CBD9BE;}
.card.lost{background:#EFEAE1;opacity:.82;}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:9px;}
.card-name{font-family:"Barlow",sans-serif;font-size:16px;line-height:1.18;letter-spacing:-.01em;}
.cn-first{font-weight:600;color:var(--text);}
.cn-last{font-weight:800;color:var(--text);}
.card-acts{display:flex;gap:2px;flex-shrink:0;opacity:.35;transition:opacity .15s;}
.card:hover .card-acts{opacity:1;}
.cact{background:none;border:none;cursor:pointer;color:var(--text2);width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cact:hover{background:var(--accent-l);color:var(--accent-d);}
.card-line{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);margin-top:3px;}
.card-line svg{flex-shrink:0;color:var(--text3);}
.card-line .ell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-sep{height:1px;background:var(--border);margin:10px 0 8px;}
.card-budget{font-family:"Barlow",sans-serif;font-size:19px;font-weight:800;color:var(--accent-d);letter-spacing:-.01em;}
.card-crit{font-size:11px;font-weight:600;color:var(--text2);margin-top:3px;}
.card-hono{font-size:12px;font-weight:700;color:var(--accent);margin-top:4px;}
.card-hono span{font-weight:500;color:var(--text3);font-size:11px;}
.card-date{text-align:right;font-size:11px;color:var(--text3);font-weight:500;margin-top:6px;}
.card-todo{display:inline-block;background:var(--orange-bg);color:var(--orange-fg);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:8px;}

.cmenu{position:absolute;top:38px;right:10px;z-index:20;background:var(--surface);border:1px solid var(--border2);border-radius:12px;box-shadow:var(--sh-lg);padding:6px;width:200px;}
.cmenu-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:5px 8px 4px;}
.cmenu-item{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;text-align:left;padding:8px;border-radius:8px;cursor:pointer;font-family:"Inter",sans-serif;font-size:12.5px;font-weight:600;color:var(--text);transition:all .12s;}
.cmenu-item:hover{background:var(--surface2);}
.cmenu-sep{height:1px;background:var(--border);margin:5px 4px;}
.cmenu-del{color:#B4482F;}
.cmenu-del:hover{background:#F8ECE7;}

.pane{flex:1;overflow:auto;padding:18px 22px;}
.list-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--sh);}
.list-table th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:12px 13px;border-bottom:1.5px solid var(--border);text-align:left;background:var(--surface2);white-space:nowrap;}
.list-table td{padding:12px 13px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);white-space:nowrap;}
.list-table tr:last-child td{border-bottom:none;}
.list-table tbody tr{cursor:pointer;}
.list-table tbody tr:hover td{background:var(--surface2);}
.td-name{color:var(--text);font-weight:700;}
.chip{display:inline-block;background:var(--accent-l);color:var(--accent-d);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.chip-stage{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.badge-todo{background:var(--orange-bg);color:var(--orange-fg);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:7px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:6px;text-align:center;padding:40px;}
.empty .et{font-family:"Barlow",sans-serif;font-weight:800;font-size:18px;color:var(--text2);}
.empty .es{font-size:13px;max-width:360px;}
.soon-badge{background:var(--gold);color:var(--brown-dark);font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.03em;margin-top:4px;}

/* BIENS */
.biens-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:14px;}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:box-shadow .15s,transform .15s;box-shadow:var(--sh);}
.bcard:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.bcard-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px;}
.bcard-title{font-family:"Barlow",sans-serif;font-weight:800;font-size:15px;color:var(--text);line-height:1.2;}
.bcard-sub{font-size:11.5px;color:var(--text2);font-weight:600;margin-top:5px;}
.bcard-price{font-family:"Barlow",sans-serif;font-size:20px;font-weight:800;color:var(--accent-d);letter-spacing:-.01em;}
.bcard-price span{font-size:11px;font-weight:600;color:var(--text3);}
.bcard-meta{font-size:11.5px;color:var(--text2);font-weight:600;margin-top:4px;}
.bcard-rdt{color:var(--accent);font-weight:700;}
.bcard-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding-top:9px;border-top:1px solid var(--border);}
.bcard-src{font-size:11px;color:var(--text3);font-weight:600;}
.blink{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--accent);text-decoration:none;}
.blink:hover{color:var(--accent-d);}
.stbadge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.stbadge.dispo{background:var(--green-bg);color:#3F5A34;}
.stbadge.offre{background:var(--orange-bg);color:var(--orange-fg);}
.stbadge.vendu{background:#EAE4D8;color:var(--text3);}
.rdt-hint{font-size:11px;color:var(--text3);margin-top:5px;}
.rdt-hint b{color:var(--accent);font-weight:700;}

/* MATCHING */
.mt-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--sh);}
.mt-modes{display:flex;gap:8px;margin-bottom:12px;}
.mt-mode{flex:1;padding:9px;border-radius:9px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-weight:700;font-size:12.5px;cursor:pointer;font-family:"Inter",sans-serif;}
.mt-mode.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.mt-fly .fg{margin-bottom:10px;}
.mt-cout{margin-top:10px;font-size:12.5px;color:var(--text2);background:var(--surface2);border-radius:9px;padding:9px 11px;}
.mt-cout b{color:var(--accent-d);font-family:"Barlow",sans-serif;}
.mt-cout span{color:var(--text3);font-size:11px;}
.mt-settings{margin-bottom:12px;}
.mt-toggle{background:none;border:none;color:var(--text2);font-weight:700;font-size:12.5px;cursor:pointer;padding:4px 0;font-family:"Inter",sans-serif;}
.mt-sliders{display:grid;grid-template-columns:1fr 1fr;gap:9px 20px;margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;}
.mt-slider{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--text2);font-weight:600;}
.mt-slider span{width:112px;flex-shrink:0;}
.mt-slider input[type=range]{flex:1;accent-color:var(--accent);}
.mt-slider b{width:46px;text-align:right;color:var(--accent-d);}
.mt-note{font-size:12px;color:var(--text3);margin-bottom:8px;}
.mt-results{display:flex;flex-direction:column;gap:9px;}
.mt-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;box-shadow:var(--sh);}
.mt-score{width:54px;height:54px;flex-shrink:0;border:2.5px solid;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Barlow",sans-serif;font-weight:800;font-size:20px;}
.mt-info{flex:1;min-width:0;}
.mt-name{font-family:"Barlow",sans-serif;font-weight:800;font-size:15px;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mt-ctx{font-size:11.5px;color:var(--text3);margin-top:2px;}
.mt-axes{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;}
.ax{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.ax.ok{background:var(--accent-l);color:var(--accent-d);border-color:var(--accent-l2);}
@media(max-width:768px){ .mt-sliders{grid-template-columns:1fr;} }

.overlay{position:fixed;inset:0;background:rgba(74,58,43,.5);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);padding:20px;}
.modal{background:var(--surface);border-radius:18px;padding:24px;width:500px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh-lg);}
.modal-title{font-size:19px;font-weight:800;color:var(--text);font-family:"Barlow",sans-serif;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:14px;}
.modal-sec{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin:18px 0 10px;padding-bottom:5px;border-bottom:1.5px solid var(--accent-l2);}
.gate{background:var(--accent-l);border:1.5px solid var(--accent-l2);border-radius:10px;padding:11px 13px;font-size:12px;font-weight:700;color:var(--accent-d);margin-bottom:14px;}
.fg{margin-bottom:12px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.fi{width:100%;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:9px;font-family:"Inter",sans-serif;font-size:13px;font-weight:500;outline:none;transition:all .15s;}
.fi:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-l);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.seg{display:flex;gap:6px;flex-wrap:wrap;}
.seg-btn{padding:8px 13px;border-radius:9px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-weight:700;font-size:12px;cursor:pointer;font-family:"Inter",sans-serif;transition:all .15s;}
.seg-btn.active{background:var(--accent-l);border-color:var(--accent);color:var(--accent-d);}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);font-weight:600;cursor:pointer;padding:9px 0;}
.fa{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.ferr{color:#B4482F;font-size:12px;font-weight:600;margin-bottom:10px;}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--brown-dark);padding:20px;}
.login-card{background:var(--surface);border-radius:20px;padding:36px 34px;width:360px;box-shadow:var(--sh-lg);}
.login-logo{width:50px;height:50px;background:var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--brown-dark);font-weight:800;font-size:22px;margin:0 auto 16px;font-family:"Barlow",sans-serif;}
.login-title{font-family:"Barlow",sans-serif;font-weight:800;font-size:21px;text-align:center;margin-bottom:2px;}
.login-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:24px;}

.bottom-nav{display:none;background:var(--surface);border-top:1px solid var(--border);padding:7px 4px;flex-shrink:0;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:9.5px;font-weight:700;background:none;border:none;font-family:"Barlow",sans-serif;padding:3px;cursor:pointer;}
.bn-item.active{color:var(--accent-d);}

::-webkit-scrollbar{width:7px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px;}
::-webkit-scrollbar-track{background:transparent;}

@media(max-width:768px){
  .app{flex-direction:column;}
  .sb{display:none;}
  .bottom-nav{display:flex;}
  .topbar{padding:12px 15px;}
  .search-bar{flex:1;width:auto;}
  .board-scroll,.pane{padding:14px;}
  .overlay{padding:0;}
  .modal{width:100%;max-width:100%;max-height:100vh;border-radius:0;}
  .fr,.fr3{grid-template-columns:1fr;}
  .mobile-logout{display:flex;}
}
</style>
</head>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

const COLS = [
  {id:"sans_suite", label:"Sans suite",              color:"#9E9384"},
  {id:"r1",         label:"R1",                      color:"#B7A489"},
  {id:"signature",  label:"En attente de signature", color:"#CBB68C"},
  {id:"recherche",  label:"En recherche",            color:"#C08552"},
  {id:"r2",         label:"R2",                      color:"#9C7A4D"},
  {id:"offre",      label:"Sous offre",              color:"#A5643C"},
  {id:"compromis",  label:"Compromis",               color:"#7E5E3B"},
  {id:"acte",       label:"Acte",                    color:"#5C4529"},
  {id:"gagne",      label:"Gagné",                   color:"#5E7A4E"},
];
const labelOf = (id)=>{ const c=COLS.find(x=>x.id===id); return c?c.label:id; };
const VILLES  = ["Mâcon","Villefranche","Autre"];
const TYPOS   = ["Studio","T1","T2","T3","T4+"];
const MEUBLE  = ["Nu","Meublé","Indifférent"];
const TRAVAUX = ["Accepte travaux","Clé en main","Indifférent"];
const ETATS   = ["À rénover","À rafraîchir","Refait"];
const DPES     = ["","A","B","C","D","E","F","G"];
const SOURCES  = ["Agent","MDB","Off-market","Autre"];
const STATUTS  = ["Dispo","Sous offre","Vendu"];
const RECH_STAGES = ["signature","recherche"];

let _id = 100;
const uid = () => "d"+(++_id);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = (iso) => { if(!iso) return ""; const p=String(iso).split("-"); return p.length<3?iso:p[2]+"/"+p[1]+"/"+p[0].slice(2); };
const asArray = (v)=> Array.isArray(v) ? v : (v ? [v] : []);
const num = (s)=>{ const n=parseFloat(String(s==null?"":s).replace(/[^0-9.,]/g,"").replace(",",".")); return isNaN(n)?0:n; };
const calcRendement = (loyer,prix,travaux)=>{ const base=num(prix)+num(travaux); const l=num(loyer); if(!base||!l) return ""; return String(Math.round(l*12/base*1000)/10); };
const criteriaComplete = (d)=> !!(d && d.ville && d.budget && asArray(d.typos).length>0 && d.surface);
const statutCls = (s)=> s==="Dispo"?"dispo":(s==="Sous offre"?"offre":"vendu");
const honoraires = (prix)=>{ const p=num(prix); return p>0 ? Math.max(8900, p*0.07) : 0; };
const TYPO_ORDER = ["Studio","T1","T2","T3","T4+"];
const villeFactor = (a,b)=>{ if(!a||!b) return 0; if(a===b) return 1; const main=x=>x==="Mâcon"||x==="Villefranche"; return (main(a)&&main(b))?0.5:0.2; };
const typoFactor = (bt, cts)=>{ const ct=asArray(cts); if(!bt||ct.length===0) return 0; const bi=TYPO_ORDER.indexOf(bt); if(bi<0) return 0; let best=99; ct.forEach(t=>{ const i=TYPO_ORDER.indexOf(t); if(i>=0) best=Math.min(best,Math.abs(bi-i)); }); return best===99?0:Math.max(0, 1 - 0.33*best); };
const budgetFactor = (cout, budget, tol)=>{ if(budget<=0) return 0; const over=Math.max(0,(cout-budget)/budget); return 1/(1+over/(tol||0.0001)); };
const surfaceFactor = (sb, smin, tol)=>{ if(smin<=0) return 1; if(sb<=0) return 0; if(sb>=smin) return 1; const under=(smin-sb)/smin; return 1/(1+under/(tol||0.0001)); };
const etatFactor = (travaux, etat)=>{ if(!etat) return 0.5; if(travaux==="Clé en main") return etat==="Refait"?1:(etat==="À rafraîchir"?0.6:0.2); return 1; };
const scoreClient = (client, bien, W, tolB, tolS)=>{
  const cout = num(bien.prix) + num(bien.travaux) + honoraires(bien.prix);
  const villePts  = W.ville   * villeFactor(bien.ville, client.ville);
  const budgetPts = W.budget  * budgetFactor(cout, num(client.budget), tolB);
  const surfPts   = W.surface * surfaceFactor(num(bien.surface), num(client.surface), tolS);
  const typoPts   = W.typo    * typoFactor(bien.typo, client.typos);
  const etatPts   = W.etat    * etatFactor(client.travaux, bien.etat);
  const raw = villePts+budgetPts+surfPts+typoPts+etatPts;
  const max = (W.ville+W.budget+W.surface+W.typo+W.etat) || 1;
  return { score: Math.round(raw/max*100), villePts, budgetPts, surfPts, typoPts, etatPts, cout };
};
const W_DEFAULT = { ville:38, budget:28, surface:18, typo:10, etat:6 };

const blank = { nom:"", tel:"", email:"", ville:"Mâcon", budget:"", hono:"", typos:[], surface:"", rendement:"", meuble:"Indifférent", travaux:"Indifférent", note:"", col:"r1", date:today() };
const blankBien = { titre:"", ville:"Mâcon", secteur:"", typo:"", surface:"", etat:"À rafraîchir", dpe:"", etage:"", ascenseur:false, prix:"", travaux:"", loyer:"", rendement:"", url:"", source:"Agent", statut:"Dispo", note:"", date:today() };

const SEED = [
  {id:uid(), col:"r1",        nom:"Thomas ROUX",     tel:"06 12 34 56 78", email:"thomas.r@mail.com", ville:"Mâcon",        budget:"120 000", hono:"8 900",  typos:["T2"],          surface:"35", rendement:"6",   meuble:"Meublé", travaux:"Accepte travaux", date:"2026-07-16", note:"Investisseur LMNP"},
  {id:uid(), col:"recherche", nom:"Léa VIDAL",       tel:"06 55 44 33 22", email:"lea.v@mail.com",    ville:"Mâcon",        budget:"110 000", hono:"8 900",  typos:["T1","Studio"], surface:"25", rendement:"6.5", meuble:"Meublé", travaux:"Accepte travaux", date:"2026-07-14", note:"Centre-ville"},
];
const SEED_BIENS = [
  {id:uid(), titre:"T2 rue Gambetta", ville:"Mâcon", secteur:"Centre", typo:"T2", surface:"38", etat:"À rafraîchir", dpe:"D", etage:"2e", ascenseur:false, prix:"115 000", travaux:"8 000", loyer:"620", rendement:"6.1", url:"", source:"Agent", statut:"Dispo", note:"", date:"2026-07-20"},
  {id:uid(), titre:"Studio quai Lamartine", ville:"Mâcon", secteur:"Quais", typo:"Studio", surface:"22", etat:"Refait", dpe:"C", etage:"3e", ascenseur:true, prix:"78 000", travaux:"0", loyer:"430", rendement:"6.6", url:"", source:"Off-market", statut:"Dispo", note:"", date:"2026-07-19"},
];

const Ic = ({n,s=14}) => {
  const p = {width:s,height:s,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"};
  if(n==="phone")   return <svg {...p}><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>;
  if(n==="building")return <svg {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01"/></svg>;
  if(n==="edit")    return <svg {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>;
  if(n==="dots")    return <svg {...p} strokeWidth={2.4}><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>;
  if(n==="trash")   return <svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>;
  if(n==="search")  return <svg {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>;
  if(n==="logout")  return <svg {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
  if(n==="board")   return <svg {...p}><rect x="3" y="3" width="6" height="18" rx="1"/><rect x="10" y="3" width="6" height="12" rx="1"/><rect x="17" y="3" width="4" height="15" rx="1"/></svg>;
  if(n==="table")   return <svg {...p}><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/></svg>;
  if(n==="home")    return <svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
  if(n==="target")  return <svg {...p}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>;
  if(n==="link")    return <svg {...p}><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>;
  return null;
};

// ─── CARTE PIPELINE ──────────────────────────────────────
function Card({ d, onEdit, onMove, onDelete, onDragStart, menuOpen, onToggleMenu }){
  const parts = (d.nom||"").trim().split(/\s+/);
  const last = parts.length ? parts[parts.length-1] : "";
  const first = parts.slice(0,-1).join(" ");
  const cls = "card"+(d.col==="gagne"?" win":"")+(d.col==="sans_suite"?" lost":"");
  const typos = asArray(d.typos);
  const critBits = [typos.join("/"), d.surface?d.surface+" m²+":"", d.rendement?d.rendement+"% (indic.)":""].filter(Boolean).join(" · ");
  const needCrit = RECH_STAGES.includes(d.col) && !criteriaComplete(d);
  return (
    <div className={cls} draggable onDragStart={e=>onDragStart(e,d.id)} onClick={()=>onEdit(d)}>
      <div className="card-hd">
        <div className="card-name">{first && <span className="cn-first">{first} </span>}<span className="cn-last">{last||"—"}</span></div>
        <div className="card-acts">
          <button className="cact" title="Modifier" onClick={e=>{e.stopPropagation();onEdit(d);}}><Ic n="edit" s={15}/></button>
          <button className="cact" title="Déplacer / supprimer" onClick={e=>{e.stopPropagation();onToggleMenu(d.id);}}><Ic n="dots" s={16}/></button>
        </div>
      </div>
      {menuOpen && (
        <div className="cmenu" onClick={e=>e.stopPropagation()}>
          <div className="cmenu-lbl">Déplacer vers</div>
          {COLS.filter(c=>c.id!==d.col).map(c=>(
            <button key={c.id} className="cmenu-item" onClick={()=>onMove(d.id,c.id)}><span className="kb-dot" style={{background:c.color}}/>{c.label}</button>
          ))}
          <div className="cmenu-sep"/>
          <button className="cmenu-item cmenu-del" onClick={()=>onDelete(d.id)}><Ic n="trash" s={14}/>Supprimer</button>
        </div>
      )}
      {d.tel   && <div className="card-line"><Ic n="phone" s={13}/><span>{d.tel}</span></div>}
      {d.ville && <div className="card-line"><Ic n="building" s={13}/><span className="ell">Recherche : {d.ville}</span></div>}
      <div className="card-sep"/>
      {d.budget && <div className="card-budget">{d.budget} €</div>}
      {critBits && <div className="card-crit">{critBits}</div>}
      {d.hono   && <div className="card-hono">{d.hono} € <span>· honoraires</span></div>}
      {needCrit && <div className="card-todo">Critères à compléter</div>}
      {d.date   && <div className="card-date">{fmtDate(d.date)}</div>}
    </div>
  );
}

          <div className="fg"><label className="fl">Surface min (m²) *</label><input className="fi" type="number" value={f.surface} onChange={e=>set("surface",e.target.value)}/></div>
        </div>
        <div className="fr">
          <div className="fg"><label className="fl">Rendement cible (%) — indicatif</label><input className="fi" type="number" step="0.1" value={f.rendement} onChange={e=>set("rendement",e.target.value)} placeholder="ex : 6"/></div>
          <div className="fg"><label className="fl">Honoraires (€)</label><input className="fi" value={f.hono} onChange={e=>set("hono",e.target.value)} placeholder="8 900 min. ou 7%"/></div>
        </div>
        <div className="fg"><label className="fl">Location</label><div className="seg">{MEUBLE.map(m=>(<button key={m} type="button" className={"seg-btn"+(f.meuble===m?" active":"")} onClick={()=>set("meuble",m)}>{m}</button>))}</div></div>

function BiensPage({ biens, search, onOpen }){
  const q = search.trim().toLowerCase();
  const rows = biens
    .filter(b=>!q || (b.titre||"").toLowerCase().includes(q) || (b.ville||"").toLowerCase().includes(q) || (b.secteur||"").toLowerCase().includes(q))
    .sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
  if(rows.length===0) return (
    <div className="empty"><Ic n="home" s={30}/><div className="et">Aucun bien</div><div className="es">Ajoute des biens sourcés — ils serviront ensuite au Matching contre tes recherches actives.</div></div>
  );
  return (
    <div className="pane">
      <div className="biens-grid">
        {rows.map(b=>{
          const sub = [b.typo, b.surface?b.surface+" m²":"", b.etat].filter(Boolean).join(" · ");
          return (
            <div key={b.id} className="bcard" onClick={()=>onOpen(b)}>
              <div className="bcard-hd">
                <div className="bcard-title">{b.titre||b.secteur||"Bien"}</div>
                <span className={"stbadge "+statutCls(b.statut)}>{b.statut}</span>
              </div>
              <div className="card-line"><Ic n="building" s={13}/><span className="ell">{b.ville}{b.secteur?" · "+b.secteur:""}</span></div>
              {sub && <div className="bcard-sub">{sub}</div>}
              <div className="card-sep"/>
              <div className="bcard-price">{b.prix||"—"} €<span> FAI</span></div>
              <div className="bcard-meta">
                {b.travaux&&num(b.travaux)>0 ? "Travaux "+b.travaux+" € · " : ""}
                {b.rendement ? <span className="bcard-rdt">{b.rendement} % brut</span> : ""}
              </div>
              <div className="bcard-foot">
                <span className="bcard-src">{b.source}</span>
                {b.url && <a className="blink" href={b.url} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}><Ic n="link" s={12}/>Annonce</a>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ONGLET RECHERCHE ────────────────────────────────────
function Recherche({ leads, search, onOpen }){
  const q = search.trim().toLowerCase();
  const rows = leads.filter(l=>RECH_STAGES.includes(l.col))
    .filter(l=>!q || (l.nom||"").toLowerCase().includes(q) || (l.ville||"").toLowerCase().includes(q))
    .sort((a,b)=>String(a.nom).localeCompare(String(b.nom)));
  if(rows.length===0) return (
    <div className="empty"><Ic n="table" s={30}/><div className="et">Aucune recherche active</div>
      <div className="es">Les clients passés en « En attente de signature » ou « En recherche » apparaissent ici avec leur cahier des charges.</div></div>
  );
  return (
    <div className="pane">
      <table className="list-table">
        <thead><tr><th>Client</th><th>Étape</th><th>Ville</th><th>Typologies</th><th>Surface min</th><th>Budget max</th><th>Rendement</th><th>Location</th><th>Travaux</th></tr></thead>
        <tbody>
          {rows.map(l=>{
            const done = criteriaComplete(l);
            return (
              <tr key={l.id} onClick={()=>onOpen(l)}>
                <td className="td-name">{l.nom}{!done && <span className="badge-todo">à compléter</span>}</td>
                <td><span className="chip chip-stage">{labelOf(l.col)}</span></td>
                <td><span className="chip">{l.ville||"—"}</span></td>
                <td>{asArray(l.typos).join(", ")||"—"}</td>
                <td>{l.surface?l.surface+" m²":"—"}</td>
                <td>{l.budget?l.budget+" €":"—"}</td>
                <td>{l.rendement?l.rendement+" %":"—"}</td>
                <td>{l.meuble||"—"}</td>
                <td>{l.travaux||"—"}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function Pipeline({ leads, search, onEdit, onMove, onDelete, menuId, setMenuId }){
  const [dragOver,setDragOver] = useState(null);
  const dragId = useRef(null);
  const q = search.trim().toLowerCase();
  const visible = leads.filter(l=>!q || (l.nom||"").toLowerCase().includes(q) || (l.ville||"").toLowerCase().includes(q) || (l.tel||"").includes(q) || (l.email||"").toLowerCase().includes(q));
  const byDate = (a,b)=>String(b.date||"").localeCompare(String(a.date||""));
  const onDragStart = (e,id)=>{ dragId.current=id; e.dataTransfer.setData("text",id); };
  return (
    <div className="board-scroll">
      <div className="kb-wrap">
        {COLS.map(col=>{
          const items = visible.filter(l=>l.col===col.id).sort(byDate);
          return (
            <div key={col.id} className={"kb-col"+(dragOver===col.id?" drag-over":"")}
              onDragOver={e=>{e.preventDefault();setDragOver(col.id);}} onDragLeave={()=>setDragOver(null)}
              onDrop={e=>{e.preventDefault();setDragOver(null);if(dragId.current)onMove(dragId.current,col.id);dragId.current=null;}}>
              <div className="kb-col-hd"><span className="kb-dot" style={{background:col.color}}/><span className="kb-col-title">{col.label}</span><span className="kb-count">{items.length}</span></div>
              <div className="kb-list">
                {items.length===0 && <div className="kb-empty">Aucun dossier</div>}
                {items.map(d=>(<Card key={d.id} d={d} onEdit={onEdit} onMove={onMove} onDelete={onDelete} onDragStart={onDragStart} menuOpen={menuId===d.id} onToggleMenu={id=>setMenuId(m=>m===id?null:id)}/>))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Login({ fb }){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  const submit=()=>{ if(!email||!pw){ setErr("Email et mot de passe requis."); return; } setErr(""); setLoading(true);
    fb.signInWithEmailAndPassword(fb.auth, email.trim(), pw).catch(()=>setErr("Email ou mot de passe incorrect.")).finally(()=>setLoading(false)); };
  return (
    <div className="login-wrap"><div className="login-card">
      <div className="login-logo">p</div><div className="login-title">Purple · Mâcon</div><div className="login-sub">Suivi des dossiers</div>
      {err && <div className="ferr" style={{textAlign:"center"}}>{err}</div>}
      <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus/></div>
      <div className="fg"><label className="fl">Mot de passe</label><input className="fi" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
      <button className="btn btn-p" style={{width:"100%",justifyContent:"center",marginTop:6}} onClick={submit} disabled={loading}>{loading?"Connexion…":"Se connecter"}</button>
    </div></div>
  );
}

// ─── ONGLET MATCHING ─────────────────────────────────────
function MatchingPage({ biens, leads }){
  const [mode,setMode] = useState("porte");
  const [selId,setSelId] = useState("");
  const [fly,setFly] = useState({ ville:"Mâcon", typo:"", surface:"", prix:"", travaux:"" });
  const [W,setW] = useState(W_DEFAULT);
  const [tolB,setTolB] = useState(25);
  const [tolS,setTolS] = useState(30);
  const [open,setOpen] = useState(false);

  const bien = mode==="porte" ? biens.find(b=>b.id===selId) : fly;
  const ready = !!(bien && num(bien.prix)>0 && bien.ville);
  const clients = leads.filter(l=>RECH_STAGES.includes(l.col) && criteriaComplete(l));
  const incomplete = leads.filter(l=>RECH_STAGES.includes(l.col) && !criteriaComplete(l)).length;
  const results = ready ? clients.map(c=>({ c, ...scoreClient(c,bien,W,tolB/100,tolS/100) })).sort((a,b)=>b.score-a.score) : [];
  const cout = ready ? (num(bien.prix)+num(bien.travaux)+honoraires(bien.prix)) : 0;
  const fmtEur = n => Math.round(n).toLocaleString("fr-FR")+" €";
  const scoreColor = s => s>=70?"var(--green)":(s>=40?"#B8894F":"var(--text3)");

  return (
    <div className="pane">
      <div className="mt-panel">
        <div className="mt-modes">
          <button className={"mt-mode"+(mode==="porte"?" on":"")} onClick={()=>setMode("porte")}>Bien du portefeuille</button>
          <button className={"mt-mode"+(mode==="vole"?" on":"")} onClick={()=>setMode("vole")}>À la volée</button>
        </div>
        {mode==="porte" ? (
          <select className="fi" value={selId} onChange={e=>setSelId(e.target.value)}>
            <option value="">— Choisir un bien —</option>
            {biens.map(b=><option key={b.id} value={b.id}>{(b.titre||b.secteur||"Bien")+" · "+b.ville+" · "+(b.prix||"?")+" €"}</option>)}
          </select>
        ) : (
          <div className="mt-fly">
            <div className="fg"><label className="fl">Ville</label><div className="seg">{VILLES.map(v=>(<button key={v} type="button" className={"seg-btn"+(fly.ville===v?" active":"")} onClick={()=>setFly(p=>({...p,ville:v}))}>{v}</button>))}</div></div>
            <div className="fg"><label className="fl">Typologie</label><div className="seg">{TYPOS.map(t=>(<button key={t} type="button" className={"seg-btn"+(fly.typo===t?" active":"")} onClick={()=>setFly(p=>({...p,typo:p.typo===t?"":t}))}>{t}</button>))}</div></div>
            <div className="fr3">
              <div className="fg"><label className="fl">Surface (m²)</label><input className="fi" value={fly.surface} onChange={e=>setFly(p=>({...p,surface:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Prix FAI (€)</label><input className="fi" value={fly.prix} onChange={e=>setFly(p=>({...p,prix:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Travaux (€)</label><input className="fi" value={fly.travaux} onChange={e=>setFly(p=>({...p,travaux:e.target.value}))}/></div>
            </div>
          </div>
        )}
        {ready && <div className="mt-cout">Coût total client : <b>{fmtEur(cout)}</b> <span>(prix {fmtEur(num(bien.prix))} + travaux {fmtEur(num(bien.travaux))} + honoraires {fmtEur(honoraires(bien.prix))})</span></div>}
      </div>

      <div className="mt-settings">
        <button className="mt-toggle" onClick={()=>setOpen(o=>!o)}>{open?"▾":"▸"} Réglages du score</button>
        {open && (
          <div className="mt-sliders">
            {[["ville","Ville"],["budget","Budget"],["surface","Surface"],["typo","Typologie"],["etat","État"]].map(([k,lab])=>(
              <div key={k} className="mt-slider"><span>{lab}</span><input type="range" min="0" max="60" value={W[k]} onChange={e=>setW(p=>({...p,[k]:+e.target.value}))}/><b>{W[k]}</b></div>
            ))}
            <div className="mt-slider"><span>Tolérance budget</span><input type="range" min="5" max="50" value={tolB} onChange={e=>setTolB(+e.target.value)}/><b>+{tolB}%</b></div>
            <div className="mt-slider"><span>Tolérance surface</span><input type="range" min="5" max="50" value={tolS} onChange={e=>setTolS(+e.target.value)}/><b>-{tolS}%</b></div>
          </div>
        )}
      </div>

      {!ready ? (
        <div className="empty"><Ic n="target" s={30}/><div className="et">Choisis ou saisis un bien</div><div className="es">Renseigne au moins la ville et le prix FAI pour lancer le scoring.</div></div>
      ) : clients.length===0 ? (
        <div className="empty"><Ic n="target" s={30}/><div className="et">Aucune recherche à scorer</div><div className="es">Passe des clients en « En attente de signature » ou « En recherche » avec un cahier des charges complet.{incomplete>0?" ("+incomplete+" incomplet"+(incomplete>1?"s":"")+")":""}</div></div>
      ) : (
        <div className="mt-results">
          {incomplete>0 && <div className="mt-note">{incomplete} client{incomplete>1?"s":""} en recherche exclu{incomplete>1?"s":""} (critères incomplets).</div>}
          {results.map(({c,score,villePts,budgetPts,surfPts,typoPts,etatPts})=>(
            <div key={c.id} className="mt-card">
              <div className="mt-score" style={{color:scoreColor(score),borderColor:scoreColor(score)}}>{score}</div>
              <div className="mt-info">
                <div className="mt-name">{c.nom} <span className="chip chip-stage">{labelOf(c.col)}</span></div>
                <div className="mt-ctx">{c.ville} · {asArray(c.typos).join("/")} · budget {c.budget} € · {c.surface} m²+</div>
                <div className="mt-axes">
                  <span className={"ax"+(villePts>=W.ville*0.6?" ok":"")}>Ville {Math.round(villePts)}/{W.ville}</span>
                  <span className={"ax"+(budgetPts>=W.budget*0.6?" ok":"")}>Budget {Math.round(budgetPts)}/{W.budget}</span>
                  <span className={"ax"+(surfPts>=W.surface*0.6?" ok":"")}>Surface {Math.round(surfPts)}/{W.surface}</span>
                  <span className={"ax"+(typoPts>=W.typo*0.6?" ok":"")}>Typo {Math.round(typoPts)}/{W.typo}</span>
                  <span className={"ax"+(etatPts>=W.etat*0.6?" ok":"")}>État {Math.round(etatPts)}/{W.etat}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Shell({ fb, demo, user }){
  const [leads,setLeads] = useState(demo?SEED:[]);
  const [biens,setBiens] = useState(demo?SEED_BIENS:[]);
  const [tab,setTab] = useState("pipeline");
  const [modal,setModal] = useState(null);
  const [search,setSearch] = useState("");
  const [menuId,setMenuId] = useState(null);

  useEffect(()=>{ if(demo || !user) return;
    const u1 = fb.onSnapshot(fb.collection(fb.db,"dossiers"), snap=>setLeads(snap.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    const u2 = fb.onSnapshot(fb.collection(fb.db,"biens"), snap=>setBiens(snap.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
    return ()=>{ u1&&u1(); u2&&u2(); };
  },[user]);
  useEffect(()=>{ if(!menuId) return; const h=()=>setMenuId(null); window.addEventListener("click",h); return ()=>window.removeEventListener("click",h); },[menuId]);

  // Dossiers
  const move = (id,col)=>{
    setMenuId(null);
    const lead = leads.find(l=>l.id===id); if(!lead) return;
    if(col==="recherche" && !criteriaComplete(lead)){ setModal({kind:"lead",lead:{...lead,col:"recherche"},gate:true}); return; }
    if(demo){ setLeads(ls=>ls.map(l=>l.id===id?{...l,col}:l)); } else { fb.updateDoc(fb.doc(fb.db,"dossiers",id),{col}); }
  };
  const saveLead = (f)=>{ setModal(null);
    if(demo){ setLeads(ls=> f.id ? ls.map(l=>l.id===f.id?{...f}:l) : [...ls,{...f,id:uid()}]); }
    else { const {id,...data}=f; if(id) fb.updateDoc(fb.doc(fb.db,"dossiers",id),data); else fb.addDoc(fb.collection(fb.db,"dossiers"),data); } };
  const delLead = (id)=>{ setModal(null); setMenuId(null); if(demo){ setLeads(ls=>ls.filter(l=>l.id!==id)); } else { fb.deleteDoc(fb.doc(fb.db,"dossiers",id)); } };

  // Biens
  const saveBien = (f)=>{ setModal(null);
    if(demo){ setBiens(bs=> f.id ? bs.map(b=>b.id===f.id?{...f}:b) : [...bs,{...f,id:uid()}]); }
    else { const {id,...data}=f; if(id) fb.updateDoc(fb.doc(fb.db,"biens",id),data); else fb.addDoc(fb.collection(fb.db,"biens"),data); } };
  const delBien = (id)=>{ setModal(null); if(demo){ setBiens(bs=>bs.filter(b=>b.id!==id)); } else { fb.deleteDoc(fb.doc(fb.db,"biens",id)); } };

  const openEditLead = (l)=>setModal({kind:"lead",lead:l,gate:false});
  const openEditBien = (b)=>setModal({kind:"bien",bien:b});
  const onAdd = ()=> tab==="biens" ? setModal({kind:"bien",bien:{...blankBien}}) : setModal({kind:"lead",lead:{...blank},gate:false});

  const rechCount = leads.filter(l=>RECH_STAGES.includes(l.col)).length;
  const showAdd = ["pipeline","recherche","biens"].includes(tab);
  const showSearch = ["pipeline","recherche","biens"].includes(tab);
  const addLabel = tab==="biens" ? "＋ Bien" : "＋ Dossier";

  const TABS = [
    {id:"pipeline",  label:"Pipeline",  icon:"board", count:leads.length},
    {id:"recherche", label:"Recherche", icon:"table", count:rechCount},
    {id:"biens",     label:"Biens",     icon:"home",  count:biens.length},
    {id:"matching",  label:"Matching",  icon:"target"},
  ];
  const META = {
    pipeline:  {t:"Pipeline",  s:leads.length+" dossier"+(leads.length>1?"s":"")+" au total"},
    recherche: {t:"Recherche", s:rechCount+" recherche"+(rechCount>1?"s":"")+" active"+(rechCount>1?"s":"")},
    biens:     {t:"Biens",     s:biens.length+" bien"+(biens.length>1?"s":"")+" en portefeuille"},
    matching:  {t:"Matching",  s:"Dépose un bien, score chaque recherche"},
  };

  return (
    <div className="app">
      <aside className="sb">
        <div className="sb-brand"><div className="sb-logo">p</div><div><div className="sb-name">Purple</div><div className="sb-sub">MÂCON / VILLEFRANCHE</div></div></div>
        <div className="sb-nav">
          {TABS.map(t=>(
            <div key={t.id} className={"nav-item"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>
              <Ic n={t.icon} s={17}/><span className="nl">{t.label}</span>
              {t.soon ? <span className="nav-soon">BIENTÔT</span> : (t.count!=null && <span className="nav-count">{t.count}</span>)}
            </div>
          ))}
        </div>
        {!demo && <div className="sb-footer"><button className="logout-btn" onClick={()=>fb.signOut(fb.auth)}><Ic n="logout" s={15}/>Se déconnecter</button></div>}
      </aside>

      <div className="content">
        {demo && <div className="demo-banner">Aperçu de démonstration — les données ne sont pas sauvegardées ici.</div>}
        <div className="topbar">
          <div><div className="pt">{META[tab].t}</div><div className="ps">{META[tab].s}</div></div>
          <div className="tb-right">
            {showSearch && <div className="search-bar"><Ic n="search" s={14}/><input placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/></div>}
            {showAdd && <button className="btn btn-p" onClick={onAdd}>{addLabel}</button>}
            {!demo && <button className="mobile-logout" title="Se déconnecter" onClick={()=>fb.signOut(fb.auth)}><Ic n="logout" s={17}/></button>}
          </div>
        </div>
        <div className="body">
          {tab==="pipeline" && <Pipeline leads={leads} search={search} onEdit={openEditLead} onMove={move} onDelete={delLead} menuId={menuId} setMenuId={setMenuId}/>}
          {tab==="recherche" && <Recherche leads={leads} search={search} onOpen={openEditLead}/>}
          {tab==="biens" && <BiensPage biens={biens} search={search} onOpen={openEditBien}/>}
          {tab==="matching" && <MatchingPage biens={biens} leads={leads}/>}
        </div>
      </div>

      <nav className="bottom-nav">
        {TABS.map(t=>(<button key={t.id} className={"bn-item"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}><Ic n={t.icon} s={20}/>{t.label}</button>))}
      </nav>

      {modal?.kind==="lead" && <LeadModal lead={modal.lead} gate={modal.gate} onSave={saveLead} onDelete={delLead} onClose={()=>setModal(null)}/>}
      {modal?.kind==="bien" && <BienModal bien={modal.bien} onSave={saveBien} onDelete={delBien} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function Root(){
  const fb = window.__fb || {ready:false};
  const demo = !fb.ready;
  const [user,setUser] = useState(demo?"demo":undefined);
  useEffect(()=>{ if(demo) return; return fb.onAuthStateChanged(fb.auth, u=>setUser(u)); },[]);
  if(demo) return <Shell fb={fb} demo={true} user="demo"/>;
  if(user===undefined) return <div style={{minHeight:"100vh",background:"var(--brown-dark)"}}/>;
  if(user===null) return <Login fb={fb}/>;
  return <Shell fb={fb} demo={false} user={user}/>;
}
function boot(){ ReactDOM.createRoot(document.getElementById("root")).render(<Root/>); }
if(window.__fb) boot(); else window.addEventListener("fbready", boot, {once:true});
</script>
